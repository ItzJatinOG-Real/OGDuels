      broadcast: "&7[&c&lSTREAK&7] &e%player% &7is on a &6&lDominating &7Kill Streak of &a%streak%&7!"
      commands:
        - "eco give %player% 100"
        - "give %player% golden_apple 1"
    10:
      broadcast: "&7[&c&lSTREAK&7] &e%player% &7has achieved a &4&lMEGA STREAK &7of &a%streak% &7kills!"
      commands:
        - "eco give %player% 500"
        - "give %player% diamond 2"
        - "effect give %player% speed 30 1"
    15:
      broadcast: "&7[&c&lSTREAK&7] &4&l%player% IS UNSTOPPABLE! &c%streak% KILLS!"
      commands:
        - "eco give %player% 1000"
        - "heal %player%"
    20:
      broadcast: "&7[&c&lSTREAK&7] &4&l%player% IS GODLIKE! KILLED &e%streak% &4&lPLAYERS IN A ROW!"
      commands:
        - "eco give %player% 2500"
        - "bc &e%player% obtained the legendary tier drops!"