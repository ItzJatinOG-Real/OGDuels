killstreaks:
  storage:
    type: "SQLite" # Set to "MySQL" or "SQLite" for data safety configurations
    host: "localhost"
    port: 3306
    database: "ogduels"
    table: "og_killstreaks"
    username: "root"
    password: ""
  
  leaderboard:
    title: "&6&lTop 10 Killstreaks Leaderboard"
    format: "&e#%pos% &b%player% &7- &a%score% Max Streak"

  milestones:
